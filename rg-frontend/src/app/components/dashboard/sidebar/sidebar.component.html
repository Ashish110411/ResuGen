<div class="sidebar d-flex flex-column justify-content-between h-100 p-4">
  
  <div class="sidebar-top d-flex flex-column gap-4">
    
    <div class="brand d-flex align-items-center cursor-pointer" routerLink="/">
      <img src="../../../assets/resugen.png" alt="ResuGen" class="logo-icon me-2 brand-logo" />
      <span class="logo-text">ResuGen</span>
    </div>

    
    <div class="user-profile p-3 d-flex align-items-center gap-3">
      <div class="avatar-circle d-flex align-items-center justify-content-center">
        {{ getUserInitials() }}
      </div>
      <div class="user-details overflow-hidden">
        <h6 class="user-name mb-0 text-truncate">{{ userName }}</h6>
        <span class="user-role text-truncate">{{ userEmail }}</span>
      </div>
    </div>

    
    <button class="btn btn-outline-light w-100 create-btn py-2.5 d-flex align-items-center justify-content-center gap-2"
      (click)="createNewResume()" [class.active]="activeResumeId === null">
      <span class="material-symbols-outlined">add</span>
      <span>Create New Resume</span>
    </button>

    
    <div class="resumes-list-container">
      <span class="section-label text-uppercase mb-2 d-block">My Resumes</span>
      <div class="resumes-scroll scrollable-panel">
        <div *ngIf="resumes.length === 0" class="no-resumes py-4 text-center">
          <span class="material-symbols-outlined mb-2 d-block">folder_open</span>
          <span class="small text-muted">No saved resumes</span>
        </div>

        <div *ngFor="let resume of resumes"
          class="resume-item p-3 mb-2 rounded-3 d-flex align-items-center justify-content-between cursor-pointer"
          [class.active]="activeResumeId === resume.id" (click)="selectResume(resume.id)">
          <div class="resume-info d-flex align-items-center gap-2 overflow-hidden">
            <span class="material-symbols-outlined resume-icon">description</span>
            <span class="resume-name text-truncate">{{ resume.name }}</span>

          </div>
          <div class="portfolio-actions">
            <button class="btn-delete border-0 bg-transparent p-1 d-flex align-items-center"
              (click)="deleteResume($event, resume.id)" title="Delete Resume">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  
  <div class="sidebar-bottom d-flex flex-column gap-3 pt-3">
    
    <div class="theme-row p-3 rounded-3 d-flex align-items-center justify-content-between cursor-pointer"
      (click)="toggleTheme()">
      <div class="d-flex align-items-center gap-2">
        <span class="material-symbols-outlined">{{ isDarkMode ? 'dark_mode' : 'light_mode' }}</span>
        <span class="small fw-medium">{{ isDarkMode ? 'Dark Mode' : 'Light Mode' }}</span>
      </div>
      <div class="theme-switch" [class.active]="isDarkMode">
        <div class="switch-handle"></div>
      </div>
    </div>

    
    <button class="btn btn-logout w-100 py-2.5 d-flex align-items-center justify-content-center gap-2"
      (click)="logout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Logout</span>
    </button>
  </div>
</div>
