<div class="card border-0 p-4 rounded-4 shadow-sm mb-4" *ngIf="visibleSections.has('certifications')">
  
  <div class="section-header d-flex justify-content-between align-items-center mb-3">
    <div class="section-title d-flex align-items-center gap-2">
      <span class="material-symbols-outlined text-primary">military_tech</span>
      <h5 class="fw-bold mb-0">Certifications</h5>
    </div>
    <div class="section-controls d-flex align-items-center gap-2">
      <button 
        type="button" 
        class="section-toggle-btn border-0 bg-transparent text-secondary d-flex align-items-center"
        (click)="isOpen = !isOpen"
        [title]="isOpen ? 'Collapse Section' : 'Expand Section'">
        <span class="material-symbols-outlined transition-transform" [class.rotated]="!isOpen">expand_more</span>
      </button>
      <button 
        type="button" 
        class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1"
        (click)="add.emit()">
        <span class="material-symbols-outlined small-icon">add</span>
        <span>Add Certification</span>
      </button>
    </div>
  </div>

  
  <div class="certifications-content-wrapper" *ngIf="isOpen">
    <div *ngIf="certificationsArray.length === 0" class="empty-list py-4 text-center text-muted">
      <span class="material-symbols-outlined mb-2 d-block">military_tech</span>
      <span class="small">No certifications added. Click "Add Certification" to start.</span>
    </div>

    <div class="certifications-list d-flex flex-column gap-3">
      <div *ngFor="let cert of certificationsArray.controls; let idx = index" 
           [formGroup]="getFormGroup(idx)" 
           class="certification-item p-3 rounded-3 border position-relative">
        
        
        <div class="d-flex justify-content-between align-items-center mb-3">
          <span class="item-badge small fw-bold text-uppercase px-2.5 py-1 rounded-2">Certification #{{ idx + 1 }}</span>
          <button 
            type="button" 
            class="btn-delete border-0 bg-transparent text-danger p-1" 
            (click)="remove.emit(idx)" 
            title="Remove Certification">
            <span class="material-symbols-outlined">delete</span>
          </button>
        </div>

        <div class="row g-3">
          
          <div class="col-md-12">
            <label class="form-label text-secondary fw-semibold small">Certification Title</label>
            <div class="input-wrapper position-relative">
              <span class="material-symbols-outlined input-icon">military_tech</span>
              <input 
                type="text" 
                formControlName="title" 
                placeholder="AWS Certified Solutions Architect"
                class="form-control">
            </div>
          </div>

          
          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Date of Issue</label>
            <div class="d-flex gap-2">
              <select formControlName="month" class="form-select flex-grow-1">
                <option value="">Month</option>
                <option *ngFor="let m of months" [value]="m">{{ m }}</option>
              </select>
              <select formControlName="year" class="form-select flex-grow-1">
                <option value="">Year</option>
                <option *ngFor="let y of years" [value]="y">{{ y }}</option>
              </select>
            </div>
          </div>

          
          <div class="col-md-6">
            <label class="form-label text-secondary fw-semibold small">Verification URL (Optional)</label>
            <div class="input-wrapper position-relative">
              <span class="material-symbols-outlined input-icon">link</span>
              <input 
                type="url" 
                formControlName="link" 
                placeholder="creds.aws.com/123456"
                class="form-control">
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
